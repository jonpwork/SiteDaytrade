<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academia Jon Padilha - HUD 2.0</title>
    <style>
        /* Base Cyberpunk */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }
        body { 
            background-color: #0a0a0f; color: #fff; display: flex; flex-direction: column;
            justify-content: center; align-items: center; height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at center, #1a1a2e 0%, #000 100%);
        }

        /* Container da Busca */
        .search-container { position: relative; width: 600px; z-index: 10; margin-bottom: 20px; }

        .cyber-input {
            width: 100%; padding: 20px; background: rgba(10, 10, 15, 0.8);
            border: 2px solid #00f0ff; border-radius: 8px; color: #00f0ff;
            font-size: 1.2rem; outline: none; transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3); text-transform: uppercase;
        }
        .cyber-input:focus { box-shadow: 0 0 30px rgba(0, 240, 255, 0.6); }

        /* Menu Holográfico */
        .hologram-menu {
            position: absolute; top: 75px; width: 100%; background: rgba(20, 20, 30, 0.9);
            border: 1px solid #ff003c; border-radius: 8px; backdrop-filter: blur(10px);
            opacity: 0; visibility: hidden; transform: translateY(-20px);
            transition: all 0.3s ease; box-shadow: 0 10px 30px rgba(255, 0, 60, 0.3); max-height: 300px; overflow-y: auto;
        }
        .hologram-menu.active { opacity: 1; visibility: visible; transform: translateY(0); }

        .result-item {
            padding: 15px 20px; border-bottom: 1px solid rgba(255, 0, 60, 0.2);
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }
        .result-item:hover { background: rgba(255, 0, 60, 0.2); border-left: 4px solid #00f0ff; }
        .result-title { font-weight: bold; color: #fff; font-size: 1rem; }
        .result-tag { font-size: 0.7rem; color: #ff003c; border: 1px solid #ff003c; padding: 3px 6px; border-radius: 4px; }

        /* Player de Vídeo Embutido (A Mágica!) */
        .video-container {
            width: 800px; height: 450px; background: #000; border: 2px solid #00f0ff;
            border-radius: 12px; box-shadow: 0 0 40px rgba(0, 240, 255, 0.4);
            display: none; /* Escondido até clicar */
            position: relative; overflow: hidden;
        }
        .video-container.active { display: block; animation: glitch-in 0.4s ease-out forwards; }
        iframe { width: 100%; height: 100%; border: none; }

        @keyframes glitch-in {
            0% { opacity: 0; transform: scale(0.9) skewX(10deg); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1) skewX(0); filter: blur(0); }
        }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="searchInput" class="cyber-input" placeholder="Digite para acessar a base de dados..." autocomplete="off">
        <div id="hologramMenu" class="hologram-menu"></div>
    </div>

    <div class="video-container" id="videoContainer">
        <iframe id="youtubePlayer" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>

    <script>
        // O SEU BANCO DE DADOS REAL DE VÍDEOS
        const videosJon = [
            { id: '_ooGu9p5jyo', titulo: 'Correção abcde AGORA no BTC', tag: 'AULA: ONDAS DE ELLIOTT' },
            { id: 'YDnX0DPJ_IE', titulo: 'Nunca fique de um lado só #bitcoin', tag: 'MISSÃO: MINDSET' },
            { id: 'GTEAoyvXjhw', titulo: 'Sinal📌 #eurusd / #btc 🔥', tag: 'AULA: ARBITRAGEM' },
            { id: 'VZ6Xb0XyXiQ', titulo: 'Atinga CONSISTÊNCIA #forex', tag: 'MISSÃO: MESTRIA' },
            { id: 'mYVGElL10ZY', titulo: 'Nunca tome stop #bitcoin', tag: 'AULA: GESTÃO DE RISCO' }
        ];

        const input = document.getElementById('searchInput');
        const menu = document.getElementById('hologramMenu');
        const videoContainer = document.getElementById('videoContainer');
        const youtubePlayer = document.getElementById('youtubePlayer');

        // Função para filtrar e mostrar resultados
        input.addEventListener('input', function() {
            const termo = this.value.toLowerCase();
            menu.innerHTML = ''; // Limpa resultados anteriores
            
            if (termo.length >= 2) {
                const resultados = videosJon.filter(vid => vid.titulo.toLowerCase().includes(termo) || vid.tag.toLowerCase().includes(termo));
                
                if (resultados.length > 0) {
                    resultados.forEach(vid => {
                        const item = document.createElement('div');
                        item.className = 'result-item';
                        item.innerHTML = `<span class="result-title">${vid.titulo}</span><span class="result-tag">${vid.tag}</span>`;
                        
                        // O Gatilho do Clique para abrir a aula
                        item.addEventListener('click', () => {
                            // Coloca o ID do vídeo no link de incorporação (embed) do YouTube
                            youtubePlayer.src = `https://www.youtube.com/embed/${vid.id}?autoplay=1&color=white&theme=dark`;
                            videoContainer.classList.add('active'); // Revela o player
                            menu.classList.remove('active'); // Esconde o menu
                            input.value = ''; // Limpa a busca
                        });
                        menu.appendChild(item);
                    });
                    menu.classList.add('active');
                } else {
                    menu.classList.remove('active');
                }
            } else {
                menu.classList.remove('active');
            }
        });
    </script>
</body>
</html>
