<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padilhaverse - A Oficina Interativa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        
        body {
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        /* O Palco: Onde a imagem de fundo do cenário fica */
        .interactive-scene {
            position: relative;
            width: 1000px;
            height: 600px;
            background-image: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=1000&auto=format&fit=crop'); /* Placeholder Cyberpunk */
            background-size: cover;
            background-position: center;
            border: 2px solid #00f0ff;
            border-radius: 15px;
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.3);
            overflow: hidden;
        }

        /* Sobreposição escura para destacar os botões */
        .scene-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 15, 0.6);
            pointer-events: none;
        }

        /* Os Hotspots (Objetos Clicáveis) */
        .hotspot {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(255, 0, 60, 0.8);
            border: 2px solid #ff003c;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: transform 0.3s ease;
        }

        /* Animação de Pulso Neon */
        .hotspot::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #ff003c;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .hotspot:hover { transform: scale(1.2); background: #00f0ff; border-color: #00f0ff; }
        .hotspot:hover::after { border-color: #00f0ff; }

        /* Labels que aparecem no hover */
        .hotspot-label {
            position: absolute;
            top: -35px;
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid #00f0ff;
            color: #00f0ff;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-weight: bold;
        }
        .hotspot:hover .hotspot-label { opacity: 1; visibility: visible; top: -45px; }

        /* Posições na Tela (Simulando objetos do cenário) */
        #obj-blueprint { top: 30%; left: 20%; } /* Planta baixa = SMC */
        #obj-monitor { top: 50%; left: 50%; }   /* Monitor Central = m1³ */
        #obj-server { top: 70%; left: 80%; }    /* Servidor = Elliott */

        /* Modal do Player de Vídeo */
        .video-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        .video-modal.active { opacity: 1; visibility: visible; }

        .modal-content {
            position: relative;
            width: 800px;
            height: 450px;
            background: #000;
            border: 2px solid #00f0ff;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.5);
            transform: scale(0.8);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .video-modal.active .modal-content { transform: scale(1); }

        .close-btn {
            position: absolute;
            top: -40px; right: 0;
            color: #ff003c;
            font-size: 2rem;
            cursor: pointer;
            transition: color 0.3s;
        }
        .close-btn:hover { color: #fff; }

        iframe { width: 100%; height: 100%; border-radius: 10px; border: none; }
    </style>
</head>
<body>

    <div class="interactive-scene">
        <div class="scene-overlay"></div>

        <div class="hotspot" id="obj-blueprint" onclick="openMission('GTEAoyvXjhw')">
            <span class="hotspot-label">MISSÃO: ARBITRAGEM</span>
        </div>

        <div class="hotspot" id="obj-monitor" onclick="openMission('VZ6Xb0XyXiQ')">
            <span class="hotspot-label">AULA: CONSISTÊNCIA</span>
        </div>

        <div class="hotspot" id="obj-server" onclick="openMission('_ooGu9p5jyo')">
            <span class="hotspot-label">AULA: ONDAS DE ELLIOTT</span>
        </div>
    </div>

    <div class="video-modal" id="videoModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeMission()">&times;</span>
            <iframe id="youtubeIframe" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const modal = document.getElementById('videoModal');
        const iframe = document.getElementById('youtubeIframe');

        // Função que aciona quando você clica em um objeto do cenário
        function openMission(videoId) {
            // Injeta o vídeo real do canal com autoplay
            iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&theme=dark&color=white`;
            modal.classList.add('active');
        }

        // Função para fechar a aula e voltar pro jogo
        function closeMission() {
            modal.classList.remove('active');
            iframe.src = ''; // Corta o vídeo para parar o som imediatamente
        }
    </script>
</body>
</html>
