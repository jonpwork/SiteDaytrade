<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padilhaverse - A Matriz do Daytrade</title>
    <style>
        /* BASE & RESET */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body { background-color: #050505; color: #fff; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        /* OVERLAY GLOBAL (Scanlines) */
        body::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 999;
        }

        /* ---------------------------------------------------
           HUD DE BUSCA SUPERIOR
           --------------------------------------------------- */
        .search-hud { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 500px; z-index: 50; }
        .cyber-input {
            width: 100%; padding: 15px 20px; background: rgba(10, 10, 15, 0.7);
            border: 1px solid #00f0ff; border-radius: 4px; color: #00f0ff;
            font-size: 1rem; outline: none; transition: all 0.3s;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2); text-transform: uppercase;
            backdrop-filter: blur(5px);
        }
        .cyber-input:focus { box-shadow: 0 0 25px rgba(0, 240, 255, 0.6); background: rgba(10, 10, 15, 0.9); }
        .hologram-menu {
            position: absolute; top: 60px; width: 100%; background: rgba(10, 10, 15, 0.95);
            border: 1px solid #ff003c; border-radius: 4px; backdrop-filter: blur(10px);
            opacity: 0; visibility: hidden; transform: translateY(-10px);
            transition: all 0.3s; box-shadow: 0 10px 30px rgba(255, 0, 60, 0.2);
            max-height: 300px; overflow-y: auto;
        }
        .hologram-menu.active { opacity: 1; visibility: visible; transform: translateY(0); }
        .result-item { padding: 12px 15px; border-bottom: 1px solid rgba(255, 0, 60, 0.3); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .result-item:hover { background: rgba(255, 0, 60, 0.2); border-left: 3px solid #00f0ff; }
        .result-title { font-weight: bold; font-size: 0.9rem; }
        .result-tag { font-size: 0.7rem; color: #ff003c; border: 1px solid #ff003c; padding: 2px 6px; border-radius: 3px; }

        /* ---------------------------------------------------
           RADAR / MINI-MAPA (FAST TRAVEL)
           --------------------------------------------------- */
        .radar-container {
            position: absolute; top: 20px; right: 20px; width: 60px; height: 60px;
            background: rgba(10, 10, 15, 0.8); border: 2px solid #00f0ff; border-radius: 50%;
            z-index: 50; cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4); overflow: hidden;
            backdrop-filter: blur(5px);
        }
        .radar-container::before {
            content: 'MAPA'; position: absolute; color: #00f0ff; font-size: 0.7rem; font-weight: bold; font-family: sans-serif;
            transition: opacity 0.3s;
        }
        .radar-container:hover { width: 250px; height: 280px; border-radius: 8px; background: rgba(10, 10, 15, 0.95); }
        .radar-container:hover::before { opacity: 0; }
        
        .radar-content { opacity: 0; visibility: hidden; transition: opacity 0.3s; width: 100%; padding: 15px; text-align: center; }
        .radar-container:hover .radar-content { opacity: 1; visibility: visible; transition-delay: 0.2s; }
        
        .radar-title { color: #00f0ff; font-size: 1rem; margin-bottom: 15px; border-bottom: 1px solid #00f0ff; padding-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        .zone-btn {
            display: block; width: 100%; padding: 10px; margin-bottom: 8px;
            background: transparent; border: 1px solid #ff003c; color: #fff; cursor: pointer;
            text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; transition: all 0.2s;
        }
        .zone-btn:hover, .zone-btn.active { background: #ff003c; color: #000; font-weight: bold; box-shadow: 0 0 10px #ff003c; }

        /* ---------------------------------------------------
           CENÁRIO INTERATIVO PRINCIPAL
           --------------------------------------------------- */
        .main-scene {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background-size: cover; background-position: center;
            transition: background-image 0.8s ease-in-out;
            z-index: 10;
        }
        .scene-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 10, 0.6); pointer-events: none; }
        
        #hotspots-container { position: relative; width: 100%; height: 100%; }

        .hotspot {
            position: absolute; width: 30px; height: 30px; background: rgba(0, 240, 255, 0.8);
            border: 2px solid #00f0ff; border-radius: 50%; cursor: pointer;
            display: flex; justify-content: center; align-items: center; z-index: 20;
            transition: transform 0.3s;
        }
        .hotspot::after {
            content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%;
            border: 2px solid #00f0ff; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
        
        .hotspot:hover { transform: scale(1.3); background: #ff003c; border-color: #ff003c; }
        .hotspot:hover::after { border-color: #ff003c; }
        
        .hotspot-label {
            position: absolute; top: -35px; background: rgba(0, 0, 0, 0.9); border: 1px solid #ff003c;
            color: #ff003c; padding: 5px 8px; border-radius: 3px; font-size: 0.75rem;
            white-space: nowrap; opacity: 0; visibility: hidden; transition: all 0.3s; text-transform: uppercase;
            pointer-events: none;
        }
        .hotspot:hover .hotspot-label { opacity: 1; visibility: visible; top: -45px; box-shadow: 0 0 10px rgba(255,0,60,0.5); }

        /* ---------------------------------------------------
           MODAL DO YOUTUBE
           --------------------------------------------------- */
        .video-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            z-index: 100; opacity: 0; visibility: hidden; transition: all 0.4s;
        }
        .video-modal.active { opacity: 1; visibility: visible; }
        .modal-content {
            position: relative; width: 80%; max-width: 1000px; aspect-ratio: 16/9;
            background: #000; border: 2px solid #00f0ff; border-radius: 8px;
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.3); transform: scale(0.9); transition: transform 0.4s;
        }
        .video-modal.active .modal-content { transform: scale(1); }
        .close-btn {
            position: absolute; top: -40px; right: 0; color: #ff003c; font-size: 2.5rem;
            cursor: pointer; transition: text-shadow 0.3s; line-height: 1;
        }
        .close-btn:hover { color: #fff; text-shadow: 0 0 15px #ff003c; }
        iframe { width: 100%; height: 100%; border: none; border-radius: 6px; }

    </style>
</head>
<body>

    <div class="search-hud">
        <input type="text" id="searchInput" class="cyber-input" placeholder="Acessar banco de dados..." autocomplete="off">
        <div id="hologramMenu" class="hologram-menu"></div>
    </div>

    <div class="radar-container">
        <div class="radar-content">
            <div class="radar-title">Mapa da Matriz</div>
            <button class="zone-btn active" onclick="changeZone('oficina', this)">Zona 2: A Oficina</button>
            <button class="zone-btn" onclick="changeZone('templo', this)">Zona 1: O Templo</button>
            <button class="zone-btn" onclick="changeZone('bunker', this)">Zona 3: Bunker m1³</button>
            <button class="zone-btn" onclick="changeZone('ruas', this)">Zona 4: As Ruas</button>
        </div>
    </div>

    <div class="main-scene" id="mainScene" style="background-image: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=1920&auto=format&fit=crop');">
        <div class="scene-overlay"></div>
        <div id="hotspots-container">
            </div>
    </div>

    <div class="video-modal" id="videoModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeVideo()">&times;</span>
            <iframe id="youtubeIframe" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        // BANCO DE DADOS DA MATRIZ: VÍDEOS REAIS DO JON PADILHA
        const dbVideos = [
            { id: '_ooGu9p5jyo', titulo: 'Correção abcde AGORA no BTC', tag: 'AULA: ELLIOTT', zone: 'oficina' },
            { id: 'YDnX0DPJ_IE', titulo: 'Nunca fique de um lado só #bitcoin', tag: 'MISSÃO: MINDSET', zone: 'templo' },
            { id: 'GTEAoyvXjhw', titulo: 'Sinal📌 #eurusd / #btc 🔥', tag: 'AULA: ARBITRAGEM', zone: 'bunker' },
            { id: 'VZ6Xb0XyXiQ', titulo: 'Atinga CONSISTÊNCIA #forex', tag: 'MISSÃO: CONSISTÊNCIA', zone: 'templo' },
            { id: 'mYVGElL10ZY', titulo: 'Nunca tome stop #bitcoin', tag: 'AULA: RISCO', zone: 'ruas' }
        ];

        // CONFIGURAÇÃO DOS MAPAS E HOTSPOTS (Posicionamento em %)
        const zonesData = {
            'oficina': {
                bg: 'https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=1920&auto=format&fit=crop',
                hotspots: [
                    { x: 30, y: 40, label: 'Teoria das Ondas', videoId: '_ooGu9p5jyo' },
                    { x: 70, y: 60, label: 'Estrutura de Mercado', videoId: 'GTEAoyvXjhw' }
                ]
            },
            'templo': {
                bg: 'https://images.unsplash.com/photo-1528360983277-13d401cdc186?q=80&w=1920&auto=format&fit=crop',
                hotspots: [
                    { x: 50, y: 30, label: 'A Lei da Suposição', videoId: 'VZ6Xb0XyXiQ' },
                    { x: 20, y: 70, label: 'Controle de Ansiedade', videoId: 'YDnX0DPJ_IE' }
                ]
            },
            'bunker': {
                bg: 'https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1920&auto=format&fit=crop',
                hotspots: [
                    { x: 45, y: 50, label: 'Gatilhos m1³', videoId: 'GTEAoyvXjhw' },
                    { x: 80, y: 30, label: 'Sincronia M15/H4', videoId: '_ooGu9p5jyo' }
                ]
            },
            'ruas': {
                bg: 'https://images.unsplash.com/photo-1605806616949-1e87b487cb2a?q=80&w=1920&auto=format&fit=crop',
                hotspots: [
                    { x: 60, y: 80, label: 'Gestão de Stop', videoId: 'mYVGElL10ZY' }
                ]
            }
        };

        const mainScene = document.getElementById('mainScene');
        const hotspotsContainer = document.getElementById('hotspots-container');
        const modal = document.getElementById('videoModal');
        const iframe = document.getElementById('youtubeIframe');

        // FUNÇÃO: Trocar o Mapa (Fast Travel)
        function changeZone(zoneId, btnElement) {
            // Atualiza botões do radar
            document.querySelectorAll('.zone-btn').forEach(btn => btn.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');

            const zone = zonesData[zoneId];
            
            // Efeito visual de troca de fundo
            mainScene.style.opacity = 0;
            
            setTimeout(() => {
                mainScene.style.backgroundImage = `url('${zone.bg}')`;
                renderHotspots(zone.hotspots);
                mainScene.style.opacity = 1;
            }, 400); // tempo para o fade
        }

        // FUNÇÃO: Renderizar bolinhas clicáveis no mapa
        function renderHotspots(hotspotsArray) {
            hotspotsContainer.innerHTML = ''; // Limpa anteriores
            hotspotsArray.forEach(hp => {
                const dot = document.createElement('div');
                dot.className = 'hotspot';
                dot.style.left = hp.x + '%';
                dot.style.top = hp.y + '%';
                dot.onclick = () => openVideo(hp.videoId);

                const label = document.createElement('span');
                label.className = 'hotspot-label';
                label.innerText = hp.label;

                dot.appendChild(label);
                hotspotsContainer.appendChild(dot);
            });
        }

        // FUNÇÃO: Abrir Vídeo
        function openVideo(videoId) {
            iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&theme=dark&color=white`;
            modal.classList.add('active');
        }

        // FUNÇÃO: Fechar Vídeo
        function closeVideo() {
            modal.classList.remove('active');
            setTimeout(() => iframe.src = '', 400); // Corta o som após a transição
        }

        // LÓGICA DA BARRA DE BUSCA (HUD)
        const inputSearch = document.getElementById('searchInput');
        const menuSearch = document.getElementById('hologramMenu');

        inputSearch.addEventListener('input', function() {
            const termo = this.value.toLowerCase();
            menuSearch.innerHTML = '';
            
            if (termo.length >= 2) {
                const resultados = dbVideos.filter(v => v.titulo.toLowerCase().includes(termo) || v.tag.toLowerCase().includes(termo));
                
                if (resultados.length > 0) {
                    resultados.forEach(vid => {
                        const item = document.createElement('div');
                        item.className = 'result-item';
                        item.innerHTML = `<span class="result-title">${vid.titulo}</span><span class="result-tag">${vid.tag}</span>`;
                        item.onclick = () => {
                            // Ao clicar na busca, muda pro mapa certo e abre o vídeo!
                            changeZone(vid.zone, document.querySelector(`button[onclick="changeZone('${vid.zone}', this)"]`));
                            openVideo(vid.id);
                            menuSearch.classList.remove('active');
                            inputSearch.value = '';
                        };
                        menuSearch.appendChild(item);
                    });
                    menuSearch.classList.add('active');
                } else {
                    menuSearch.classList.remove('active');
                }
            } else {
                menuSearch.classList.remove('active');
            }
        });

        // Inicia a cena padrão
        renderHotspots(zonesData['oficina'].hotspots);

    </script>
</body>
</html>
